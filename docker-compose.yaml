services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "sleep 5 && /usr/local/bin/tern migrate --migrations ./migrations --conn-string $DATABASE_URL_DOCKER && ./main"
    restart: on-failure

  postgres:
    image: "postgres:17"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=todo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo"  ]
      interval: 5s
      timeout: 10s
      retries: 5